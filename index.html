<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Fit Video + Disclaimer</title>

<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: #000;
}

/* Full mobile fit */
.wrapper {
  width: 100%;
  height: 100vh;
}

/* Main container */
.video-container {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
}

/* Video auto adjusts */
video {
  width: 100%;
  flex: 1;
  object-fit: contain;
  background: #000;
  display: block;
}

/* Disclaimer always visible */
.disclaimer-bar {
  width: 100%;
  height: auto;
  min-height: 42px;
  display: flex;
  background: linear-gradient(90deg, #000428, #004e92);
  border-top: 2px solid yellow;
  border-bottom: 2px solid red;
  flex-shrink: 0;
}

/* Label */
.label {
  background: linear-gradient(45deg, red, orange);
  color: white;
  padding: 8px 12px;
  font-weight: bold;
  white-space: nowrap;
  display: flex;
  align-items: center;
  font-size: 13px;
  flex-shrink: 0;
}

/* Scroll area */
.scroll-box {
  flex: 1;
  overflow: hidden;
  display: flex;
  align-items: center;
}

/* Text */
.scroll-text {
  display: inline-block;
  white-space: nowrap;
  padding-left: 100%;
  animation: scroll-left 14s linear infinite;
  color: yellow;
  font-weight: bold;
  font-size: 13px;
}

/* Animation */
@keyframes scroll-left {
  from {
    transform: translateX(0);
  }
  to {
    transform: translateX(-100%);
  }
}

/* Mobile optimization */
@media (max-width: 768px) {
  .disclaimer-bar {
    min-height: 38px;
  }

  .label {
    font-size: 10px;
    padding: 6px 8px;
  }

  .scroll-text {
    font-size: 11px;
    animation-duration: 12s;
  }
}

/* Small mobile */
@media (max-width: 480px) {
  .disclaimer-bar {
    min-height: 34px;
  }

  .label {
    font-size: 9px;
    padding: 5px 7px;
  }

  .scroll-text {
    font-size: 10px;
    animation-duration: 10s;
  }
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="video-container">

    <!-- Video -->
    <video controls autoplay muted loop playsinline>
      <source src="your-video.mp4" type="video/mp4">
      आपका ब्राउज़र वीडियो सपोर्ट नहीं करता।
    </video>

    <!-- Disclaimer -->
    <div class="disclaimer-bar">

      <div class="label">⚠ DISCLAIMER</div>

      <div class="scroll-box">
        <div class="scroll-text">
          यह समाचार केवल जानकारी के उद्देश्य से है | चैनल किसी भी प्रकार की जिम्मेदारी नहीं लेता |
          सभी निर्णय अपनी जिम्मेदारी पर लें |
        </div>
      </div>

    </div>

  </div>
</div>

</body>
</html>
