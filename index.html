<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News Style Video + Disclaimer</title>

<style>
body {
  margin: 0;
  background: #111;
  font-family: Arial, sans-serif;
}

/* Center layout */
.wrapper {
  display: flex;
  justify-content: center;
  padding: 20px 10px;
}

/* Video container */
.video-container {
  width: 100%;
  max-width: 800px;
}

/* Video */
video {
  width: 100%;
  display: block;
}

/* Disclaimer bar */
.disclaimer-bar {
  display: flex;
  width: 100%;
  background: #000;
}

/* Left label */
.label {
  background: red;
  color: #fff;
  padding: 10px 15px;
  font-weight: bold;
  white-space: nowrap;
}

/* Scrolling area */
.scroll-box {
  overflow: hidden;
  flex: 1;
  background: #222;
  display: flex;
  align-items: center;
}

/* Text */
.scroll-text {
  display: inline-block;
  white-space: nowrap;
  animation: scroll-left 15s linear infinite;
  font-weight: bold;
  padding-left: 100%;
  color: #fff;
}

/* Animation */
@keyframes scroll-left {
  from { transform: translateX(0); }
  to { transform: translateX(-100%); }
}

/* Responsive */
@media (max-width: 600px) {
  .label { font-size: 12px; padding: 8px; }
  .scroll-text { font-size: 12px; }
}

@media (min-width: 601px) {
  .scroll-text { font-size: 16px; }
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="video-container">

    <!-- 🎬 Video -->
    <video controls autoplay muted loop playsinline>
      <source src="your-video.mp4" type="video/mp4">
      आपका ब्राउज़र वीडियो सपोर्ट नहीं करता।
    </video>

    <!-- 📰 Disclaimer Bar -->
    <div class="disclaimer-bar">

      <div class="label">⚠ DISCLAIMER</div>

      <div class="scroll-box">
        <div class="scroll-text">
          यह समाचार केवल जानकारी के उद्देश्य से है | चैनल किसी भी प्रकार की जिम्मेदारी नहीं लेता |
          सभी निर्णय अपनी जिम्मेदारी पर लें |
        </div>
      </div>

    </div>

  </div>
</div>

</body>
</html>
