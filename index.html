<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News Style Video + Disclaimer</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: transparent;
}

.wrapper {
  width: 100%;
  margin: 0;
  padding: 0;
}

.video-container {
  width: 100%;
  max-width: 100%;
  overflow: hidden;
}

video {
  width: 100%;
  height: auto;
  display: block;
  object-fit: cover;
}

/* Disclaimer Bar */
.disclaimer-bar {
  display: flex;
  width: 100%;
  background: #000;
  min-height: 40px;
}

.label {
  background: red;
  color: white;
  padding: 8px 12px;
  font-weight: bold;
  white-space: nowrap;
  display: flex;
  align-items: center;
  flex-shrink: 0;
}

.scroll-box {
  flex: 1;
  overflow: hidden;
  background: #222;
  display: flex;
  align-items: center;
}

.scroll-text {
  white-space: nowrap;
  display: inline-block;
  padding-left: 100%;
  animation: scroll-left 15s linear infinite;
  color: white;
  font-weight: bold;
}

@keyframes scroll-left {
  from { transform: translateX(0); }
  to { transform: translateX(-100%); }
}

/* Mobile */
@media (max-width: 768px) {
  .label {
    font-size: 11px;
    padding: 7px 10px;
  }

  .scroll-text {
    font-size: 12px;
  }
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="video-container">

    <!-- 🎬 Video -->
    <video controls autoplay muted loop playsinline>
      <source src="your-video.mp4" type="video/mp4">
      आपका ब्राउज़र वीडियो सपोर्ट नहीं करता।
    </video>

    <!-- 📰 Disclaimer Bar -->
    <div class="disclaimer-bar">

      <div class="label">⚠ DISCLAIMER</div>

      <div class="scroll-box">
        <div class="scroll-text">
          यह समाचार केवल जानकारी के उद्देश्य से है | चैनल किसी भी प्रकार की जिम्मेदारी नहीं लेता |
          सभी निर्णय अपनी जिम्मेदारी पर लें |
        </div>
      </div>

    </div>

  </div>
</div>

</body>
</html>
