<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive News Style Video + Disclaimer</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: #111;
  font-family: Arial, sans-serif;
}

/* Main wrapper */
.wrapper {
  display: flex;
  justify-content: center;
  padding: 10px;
  width: 100%;
}

/* Video section */
.video-container {
  width: 100%;
  max-width: 900px;
  overflow: hidden;
  border-radius: 8px;
}

/* Video */
video {
  width: 100%;
  height: auto;
  display: block;
  max-height: 75vh;
  object-fit: cover;
}

/* Disclaimer bar */
.disclaimer-bar {
  display: flex;
  width: 100%;
  flex-wrap: nowrap;
  background: #000;
  min-height: 45px;
}

/* Left warning label */
.label {
  background: red;
  color: #fff;
  padding: 10px 14px;
  font-weight: bold;
  white-space: nowrap;
  display: flex;
  align-items: center;
  flex-shrink: 0;
  font-size: 14px;
}

/* Scroll area */
.scroll-box {
  overflow: hidden;
  flex: 1;
  background: #222;
  display: flex;
  align-items: center;
  position: relative;
}

/* Moving text */
.scroll-text {
  display: inline-block;
  white-space: nowrap;
  color: #fff;
  font-weight: bold;
  padding-left: 100%;
  animation: scroll-left 18s linear infinite;
  font-size: 14px;
}

/* Smooth scrolling */
@keyframes scroll-left {
  from {
    transform: translateX(0);
  }
  to {
    transform: translateX(-100%);
  }
}

/* Mobile responsive */
@media (max-width: 768px) {
  .wrapper {
    padding: 0;
  }

  .video-container {
    width: 100%;
    max-width: 100%;
    border-radius: 0;
  }

  video {
    width: 100%;
    max-height: 60vh;
  }

  .disclaimer-bar {
    min-height: 40px;
  }

  .label {
    font-size: 11px;
    padding: 8px 10px;
  }

  .scroll-text {
    font-size: 12px;
    animation-duration: 14s;
  }
}

/* Extra small devices */
@media (max-width: 480px) {
  .label {
    font-size: 10px;
    padding: 7px 8px;
  }

  .scroll-text {
    font-size: 11px;
    animation-duration: 12s;
  }
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="video-container">

    <!-- Video -->
    <video controls autoplay muted loop playsinline>
      <source src="your-video.mp4" type="video/mp4">
      आपका ब्राउज़र वीडियो सपोर्ट नहीं करता।
    </video>

    <!-- Disclaimer -->
    <div class="disclaimer-bar">

      <div class="label">⚠ DISCLAIMER</div>

      <div class="scroll-box">
        <div class="scroll-text">
          यह समाचार केवल जानकारी के उद्देश्य से है | चैनल किसी भी प्रकार की जिम्मेदारी नहीं लेता |
          सभी निर्णय अपनी जिम्मेदारी पर लें |
        </div>
      </div>

    </div>

  </div>
</div>

</body>
</html>
