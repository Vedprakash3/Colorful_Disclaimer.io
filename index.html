<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Screen Video + Fixed Disclaimer</title>

<style>
* {
  box-sizing: border-box;
}

/* Remove full page scrolling */
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: #000;
}

/* Main container fills screen */
.wrapper {
  width: 100%;
  height: 100vh;
}

/* Video container */
.video-container {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
}

/* Video fills available space */
video {
  width: 100%;
  height: calc(100vh - 50px);
  object-fit: cover;
  display: block;
}

/* Disclaimer bar fixed at bottom */
.disclaimer-bar {
  width: 100%;
  min-height: 50px;
  display: flex;
  background: linear-gradient(90deg, #000428, #004e92);
  border-top: 2px solid yellow;
  border-bottom: 2px solid red;
  flex-shrink: 0;
}

/* Label */
.label {
  background: linear-gradient(45deg, red, orange);
  color: white;
  padding: 8px 14px;
  font-weight: bold;
  white-space: nowrap;
  display: flex;
  align-items: center;
  font-size: 14px;
  flex-shrink: 0;
}

/* Scroll box */
.scroll-box {
  flex: 1;
  overflow: hidden;
  display: flex;
  align-items: center;
}

/* Scrolling text */
.scroll-text {
  display: inline-block;
  white-space: nowrap;
  padding-left: 100%;
  animation: scroll-left 15s linear infinite;
  color: yellow;
  font-weight: bold;
  font-size: 14px;
}

/* Animation */
@keyframes scroll-left {
  from {
    transform: translateX(0);
  }
  to {
    transform: translateX(-100%);
  }
}

/* Mobile */
@media (max-width: 768px) {
  video {
    height: calc(100vh - 42px);
  }

  .label {
    font-size: 11px;
    padding: 7px 10px;
  }

  .scroll-text {
    font-size: 12px;
    animation-duration: 13s;
  }

  .disclaimer-bar {
    min-height: 42px;
  }
}

/* Extra small */
@media (max-width: 480px) {
  video {
    height: calc(100vh - 38px);
  }

  .label {
    font-size: 10px;
    padding: 6px 8px;
  }

  .scroll-text {
    font-size: 11px;
    animation-duration: 11s;
  }

  .disclaimer-bar {
    min-height: 38px;
  }
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="video-container">

    <!-- Video -->
    <video controls autoplay muted loop playsinline>
      <source src="your-video.mp4" type="video/mp4">
      आपका ब्राउज़र वीडियो सपोर्ट नहीं करता।
    </video>

    <!-- Fixed Disclaimer -->
    <div class="disclaimer-bar">
      <div class="label">⚠ DISCLAIMER</div>

      <div class="scroll-box">
        <div class="scroll-text">
          यह समाचार केवल जानकारी के उद्देश्य से है | चैनल किसी भी प्रकार की जिम्मेदारी नहीं लेता |
          सभी निर्णय अपनी जिम्मेदारी पर लें |
        </div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
