<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Style Smaller Video + Disclaimer</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000; /* Full black background */
  display: flex;
  justify-content: center;
  padding: 20px;
}

/* Center wrapper like YouTube */
.wrapper {
  width: 100%;
  max-width: 800px;
}

/* Video container */
.video-container {
  width: 100%;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 4px 15px rgba(255,255,255,0.15);
  background: #000;
}

/* Video */
video {
  width: 100%;
  height: auto;
  display: block;
  max-height: 450px;
  object-fit: cover;
  background: #000;
}

/* Disclaimer bar */
.disclaimer-bar {
  display: flex;
  width: 100%;
  min-height: 45px;
  background: linear-gradient(90deg, #111, #222, #111);
  border-top: 2px solid yellow;
  border-bottom: 2px solid red;
}

/* Warning label */
.label {
  background: linear-gradient(45deg, red, orange);
  color: #fff;
  padding: 8px 16px;
  font-weight: bold;
  white-space: nowrap;
  display: flex;
  align-items: center;
  flex-shrink: 0;
  font-size: 14px;
  text-shadow: 1px 1px 2px black;
}

/* Scroll box */
.scroll-box {
  flex: 1;
  overflow: hidden;
  display: flex;
  align-items: center;
  background: linear-gradient(90deg, #000428, #004e92);
}

/* Scrolling text */
.scroll-text {
  display: inline-block;
  white-space: nowrap;
  padding-left: 100%;
  animation: scroll-left 15s linear infinite;
  color: yellow;
  font-weight: bold;
  font-size: 15px;
  text-shadow: 1px 1px 2px black;
}

/* Animation */
@keyframes scroll-left {
  from {
    transform: translateX(0);
  }
  to {
    transform: translateX(-100%);
  }
}

/* Tablet responsive */
@media (max-width: 768px) {
  .wrapper {
    max-width: 95%;
  }

  video {
    max-height: 300px;
  }

  .label {
    font-size: 11px;
    padding: 7px 10px;
  }

  .scroll-text {
    font-size: 12px;
    animation-duration: 13s;
  }

  .disclaimer-bar {
    min-height: 40px;
  }
}

/* Mobile responsive */
@media (max-width: 480px) {
  body {
    padding: 10px;
  }

  video {
    max-height: 220px;
  }

  .label {
    font-size: 10px;
    padding: 6px 8px;
  }

  .scroll-text {
    font-size: 11px;
    animation-duration: 11s;
  }
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="video-container">

    <!-- Video -->
    <video controls autoplay muted loop playsinline>
      <source src="your-video.mp4" type="video/mp4">
      आपका ब्राउज़र वीडियो सपोर्ट नहीं करता।
    </video>

    <!-- Disclaimer -->
    <div class="disclaimer-bar">

      <div class="label">⚠ DISCLAIMER</div>

      <div class="scroll-box">
        <div class="scroll-text">
          यह समाचार केवल जानकारी के उद्देश्य से है | चैनल किसी भी प्रकार की जिम्मेदारी नहीं लेता |
          सभी निर्णय अपनी जिम्मेदारी पर लें |
        </div>
      </div>

    </div>

  </div>
</div>

</body>
</html>
