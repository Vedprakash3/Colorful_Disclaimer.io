<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centered Video Ticker</title>

<style>
body {
  margin: 0;
  background: #111;
  font-family: Arial, sans-serif;
}

/* Center layout */
.wrapper {
  display: flex;
  justify-content: center;
  padding: 20px 10px;
}

/* YouTube style container */
.video-container {
  position: relative;
  width: 100%;
  max-width: 800px; /* 🔥 YouTube जैसा size */
}

/* 16:9 aspect ratio */
.video-box {
  position: relative;
  width: 100%;
  padding-top: 56.25%; /* 16:9 */
}

.video-box video {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

/* Ticker */
.ticker {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: rgba(0,0,0,0.7);
  overflow: hidden;
  padding: 6px 0;
}

/* Text */
.text {
  display: inline-block;
  white-space: nowrap;
  animation: scroll-left 15s linear infinite;
  font-weight: bold;
}

/* Animation */
@keyframes scroll-left {
  from { transform: translateX(100%); }
  to { transform: translateX(-100%); }
}

/* Responsive text */
@media (max-width: 600px) {
  .text { font-size: 14px; }
}
@media (min-width: 601px) {
  .text { font-size: 18px; }
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="video-container">

    <div class="video-box">
      <video controls autoplay muted loop playsinline>
        <source src="your-video.mp4" type="video/mp4">
      </video>

      <div class="ticker">
        <div class="text">
          <span style="color:#ff3b3b;">⚠ महत्वपूर्ण सूचना!</span>&nbsp;&nbsp;
          <span style="color:#00eaff;"> यह टेक्स्ट नीले रंग में है!</span>&nbsp;&nbsp;
          <span style="color:#32ff32;"> यह हरे रंग में है!</span>&nbsp;&nbsp;
          <span style="color:#ffea00;"> और यह पीले रंग में स्क्रॉल हो रहा है!</span>
        </div>
      </div>

    </div>

  </div>

</div>

</body>
</html>
